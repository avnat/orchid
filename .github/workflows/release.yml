name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build & release (e.g. v1.2.0 or v1.2.0-rc.1)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}

jobs:
  release:
    runs-on: macos-14 # Apple Silicon → arm64 dmg
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false' # we ad-hoc sign in afterPack; don't hunt for a cert
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Build dmg (arm64, ad-hoc signed)
        run: npx electron-builder --mac dmg --arm64
      - name: Resolve tag + prerelease
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release notes
        run: node scripts/release-notes.mjs "${{ steps.meta.outputs.tag }}" > release-notes.md
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Orchid ${{ steps.meta.outputs.tag }}
          body_path: release-notes.md
          files: dist/*.dmg
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.prerelease == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
