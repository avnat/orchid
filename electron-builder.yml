appId: com.avnee.orchid
productName: Orchid
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*
mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
  identity: null # electron-builder's own signing off; we ad-hoc sign in afterPack
# Ad-hoc sign the app so macOS doesn't flag it as "damaged" on download.
# Friends still get a one-time "Open Anyway" (no Terminal). Full notarization
# would need an Apple Developer account.
afterPack: build/adhoc-sign.cjs
